name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  Security-Scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # CHẠY QUÉT BẢO MẬT BẰNG TRIVY
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-demo:${{ github.sha }}'
          format: 'table'
          exit-code: '0' 
          severity: 'CRITICAL,HIGH'

  Deploy-to-AWS:
    needs: Security-Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # ĐĂNG NHẬP VÀO AWS QUA OIDC ROLE
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1 # Đổi lại vùng của bạn nếu khác

      - name: Deploy Application
        run: |
          echo "Pipeline đã quét bảo mật thành công và đang thực hiện Deploy an toàn lên EC2..."